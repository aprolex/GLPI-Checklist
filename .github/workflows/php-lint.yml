name: PHP Lint

on:
  push:
    paths:
      - 'plugin/**/*.php'
      - '.github/workflows/php-lint.yml'
  pull_request:
    paths:
      - 'plugin/**/*.php'

jobs:
  lint:
    name: PHP ${{ matrix.php }} syntax check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Lint all PHP files
        run: |
          set -e
          find plugin -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l
